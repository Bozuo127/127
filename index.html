<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ye Erqi</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
background:#fff;
color:#111;
transition:0.3s;
}

.dark{
background:#000;
color:#fff;
}

.topbar{
position:fixed;
top:15px;
right:15px;
display:flex;
gap:10px;
z-index:10;
}

.topbar button{
border:1px solid rgba(0,0,0,0.2);
background:none;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-size:12px;
color:inherit;
}

section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

h1{
font-size:52px;
margin:0;
font-weight:600;
}

input{
padding:12px;
border-radius:12px;
border:1px solid #ccc;
text-align:center;
margin-top:10px;
width:220px;
}

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:20px;
cursor:pointer;
background:#111;
color:#fff;
}

.dark button{
background:#fff;
color:#000;
}

.small{
opacity:0.6;
font-size:14px;
margin-top:10px;
}

/* 留言列表 */
#list{
margin-top:15px;
width:300px;
text-align:left;
}

.msg{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #ddd;
font-size:14px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="toggleLang()">EN/中</button>
<button onclick="toggleTheme()">🌓</button>
<button onclick="toggleMusic()">🎵</button>
</div>

<!-- LOGIN -->
<section id="login">
<h1>Say My Name</h1>

<input id="name" placeholder="name">
<button onclick="check()">Enter</button>

<p id="msg" class="small"></p>

<!-- 更稳定音乐源（必须用户点击播放） -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2c9b2c8f5b.mp3?filename=soft-piano-ambient-110397.mp3" type="audio/mpeg">
</audio>
</section>

<!-- MAIN -->
<section id="main" style="display:none">

<h1>叶尔祺</h1>

<p>
宁波大学 · 电气工程 · 大二 · 19岁<br>
🏓 乒乓球 ⚽ 足球 📚 球状闪电<br>
🎵 Hey Jude<br><br>
<span class="small">strive for your future</span>
</p>
</section>

<!-- Q&A（留言系统） -->
<section id="qa" style="display:none">

<h1>Q&A</h1>

<input id="q" placeholder="leave a message">
<button onclick="addMsg()">Send</button>

<div id="list"></div>
</section>

<script>

let lang="zh";
let music=document.getElementById("music");

/* ===== 登录 ===== */
function check(){
let v=document.getElementById("name").value;

if(v==="叶尔祺"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";
document.getElementById("qa").style.display="flex";
loadMsg();
}else{
document.getElementById("msg").innerText="Wrong Name";
}
}

/* ===== 音乐（必须用户点击才允许） ===== */
function toggleMusic(){
if(music.paused){
music.play().catch(()=>alert("浏览器阻止自动播放，请再点一次🎵"));
}else{
music.pause();
}
}

/* ===== 黑白 ===== */
function toggleTheme(){
document.body.classList.toggle("dark");
}

/* ===== 留言系统（localStorage） ===== */
function addMsg(){
let val=document.getElementById("q").value;
if(!val)return;

let msgs=JSON.parse(localStorage.getItem("msgs")||"[]");
msgs.push(val);
localStorage.setItem("msgs",JSON.stringify(msgs));

document.getElementById("q").value="";
render();
}

function loadMsg(){
render();
}

function render(){
let box=document.getElementById("list");
box.innerHTML="";

let msgs=JSON.parse(localStorage.getItem("msgs")||"[]");

msgs.forEach((m,i)=>{
let div=document.createElement("div");
div.className="msg";
div.innerHTML=`
<span>${m}</span>
<button onclick="del(${i})">x</button>
`;
box.appendChild(div);
});
}

function del(i){
let msgs=JSON.parse(localStorage.getItem("msgs")||"[]");
msgs.splice(i,1);
localStorage.setItem("msgs",JSON.stringify(msgs));
render();
}

/* ===== 中英文 ===== */
function toggleLang(){
alert("当前版本已精简语言系统（可下一版升级）");
}

</script>

</body>
</html>
