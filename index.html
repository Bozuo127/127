<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ye Erqi</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue";
background:#fff;
color:#111;
transition:0.3s;
}

/* 黑夜模式 */
.dark{
background:#000;
color:#fff;
}

/* 顶部按钮 */
.topbar{
position:fixed;
top:15px;
right:15px;
display:flex;
gap:10px;
z-index:10;
}

.topbar button{
border:1px solid rgba(0,0,0,0.2);
background:none;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-size:12px;
color:inherit;
}

/* 页面布局 */
section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

h1{
font-size:52px;
margin:0;
font-weight:600;
letter-spacing:-1px;
}

input{
padding:12px;
border-radius:12px;
border:1px solid #ccc;
text-align:center;
margin-top:15px;
outline:none;
width:220px;
}

button{
margin-top:12px;
padding:10px 16px;
border:none;
border-radius:20px;
cursor:pointer;
background:#111;
color:#fff;
}

.dark button{
background:#fff;
color:#000;
}

.small{
opacity:0.6;
font-size:14px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="topbar">
<button onclick="toggleLang()">EN/中</button>
<button onclick="toggleTheme()">🌓</button>
<button onclick="toggleMusic()">🎵</button>
</div>

<!-- ===== LOGIN ===== -->
<section id="login">
<h1 id="title">Say My Name</h1>

<input id="name" placeholder="name">
<button onclick="check()">Enter</button>

<p id="msg" class="small"></p>

<!-- 音乐（点击播放） -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-sunny.mp3"></audio>
</section>

<!-- ===== MAIN ===== -->
<section id="main" style="display:none">

<h1 id="nameTitle">叶尔祺</h1>

<p id="intro">
宁波大学 · 电气工程 · 大二 · 19岁
</p>

<p id="hobby">
🏓 乒乓球<br>
⚽ 足球<br>
📚 阅读：《球状闪电》<br>
🎵 Hey Jude
</p>

<p class="small">
strive for your future
</p>
</section>

<!-- ===== Q&A ===== -->
<section id="qa" style="display:none">

<h1>Q&A</h1>

<input id="q" placeholder="ask something">
<button onclick="send()">Send</button>

<p class="small">（会尽力回复！）</p>

</section>

<script>

let lang="zh";
let music=document.getElementById("music");

/* ===== 登录 ===== */
function check(){
let v=document.getElementById("name").value;

if(v==="叶尔祺"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";
document.getElementById("qa").style.display="flex";
}else{
document.getElementById("msg").innerText="Wrong Name";
}
}

/* ===== 邮件发送 ===== */
function send(){
let q=document.getElementById("q").value;
if(!q)return;

window.location.href=
"mailto:15258895590@163.com?subject=Q&A&body="+encodeURIComponent(q);
}

/* ===== 音乐控制（必须点击才能播放） ===== */
function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

/* ===== 黑白模式 ===== */
function toggleTheme(){
document.body.classList.toggle("dark");
}

/* ===== 中英文切换 ===== */
const i18n={
zh:{
intro:"宁波大学 · 电气工程 · 大二 · 19岁",
hobby:"🏓 乒乓球<br>⚽ 足球<br>📚 阅读：《球状闪电》<br>🎵 Hey Jude"
},
en:{
intro:"Ningbo University · Electrical Engineering · Sophomore · 19",
hobby:"🏓 Table Tennis<br>⚽ Football<br>📚 Reading: Ball Lightning<br>🎵 Hey Jude"
}
};

function toggleLang(){
lang = (lang==="zh") ? "en" : "zh";

document.getElementById("intro").innerHTML = i18n[lang].intro;
document.getElementById("hobby").innerHTML = i18n[lang].hobby;
}

</script>

</body>
</html>
