<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ye Erqi</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
background:#fff;
color:#111;
transition:0.3s;
}

.dark{
background:#000;
color:#fff;
}

.topbar{
position:fixed;
top:15px;
right:15px;
display:flex;
gap:10px;
z-index:10;
}

.topbar button{
border:1px solid rgba(0,0,0,0.2);
background:none;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-size:12px;
color:inherit;
}

/* STRIVE 超大标题 */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:64px;
font-weight:700;
letter-spacing:-2px;
margin:0;
}

/* 页面 */
section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:40px 20px;
}

h2{
font-size:40px;
margin-bottom:10px;
}

input{
padding:12px;
border-radius:12px;
border:1px solid #ccc;
text-align:center;
width:220px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:20px;
cursor:pointer;
background:#111;
color:#fff;
}

.dark button{
background:#fff;
color:#000;
}

.small{
opacity:0.6;
font-size:14px;
margin-top:10px;
}

.msg{
margin-top:10px;
width:300px;
border-bottom:1px solid #ddd;
padding:6px;
font-size:14px;
text-align:left;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="topbar">
<button onclick="toggleTheme()">🌓</button>
<button onclick="toggleMusic()">🎵</button>
</div>

<!-- 🔥 HERO -->
<div class="hero">
<h1>STRIVE FOR YOUR FUTURE</h1>
<p class="small">Ye Erqi</p>
</div>

<!-- ABOUT -->
<section>
<h2>About</h2>
<p>
宁波大学 · 电气工程 · 大二 · 19岁<br>
🏓 乒乓球 ⚽ 足球 📚 阅读《球状闪电》<br>
🎵 Hey Jude<br>
✝ Christian
</p>
</section>

<!-- Q&A -->
<section>
<h2>Q&A</h2>

<input id="q" placeholder="leave a message">
<button onclick="addMsg()">Send</button>

<div id="list"></div>
</section>

<!-- 音乐 -->
<audio id="music" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2c9b2c8f5b.mp3?filename=soft-piano-ambient-110397.mp3" type="audio/mpeg">
</audio>

<script>

let music=document.getElementById("music");

/* 🎵 音乐（浏览器必须用户触发） */
function toggleMusic(){
if(music.paused){
music.play().catch(()=>alert("点击页面任意位置后再试 🎵"));
}else{
music.pause();
}
}

/* 🌓 */
function toggleTheme(){
document.body.classList.toggle("dark");
}

/* 💬 留言系统（支持“回复”） */
function addMsg(){
let val=document.getElementById("q").value;
if(!val)return;

let msgs=JSON.parse(localStorage.getItem("msgs")||"[]");

msgs.push({
text:val,
reply:""   // 预留回复
});

localStorage.setItem("msgs",JSON.stringify(msgs));

document.getElementById("q").value="";
render();
}

/* 回复 */
function replyMsg(i){
let r=prompt("Reply:");
if(!r)return;

let msgs=JSON.parse(localStorage.getItem("msgs")||"[]");
msgs[i].reply=r;

localStorage.setItem("msgs",JSON.stringify(msgs));
render();
}

/* 删除 */
function del(i){
let msgs=JSON.parse(localStorage.getItem("msgs")||"[]");
msgs.splice(i,1);
localStorage.setItem("msgs",JSON.stringify(msgs));
render();
}

/* 渲染 */
function render(){
let box=document.getElementById("list");
box.innerHTML="";

let msgs=JSON.parse(localStorage.getItem("msgs")||"[]");

msgs.forEach((m,i)=>{
let div=document.createElement("div");
div.className="msg";

div.innerHTML=`
<div>${m.text}</div>
${m.reply ? `<div style="opacity:0.6">↳ ${m.reply}</div>` : ""}
<button onclick="replyMsg(${i})">Reply</button>
<button onclick="del(${i})">x</button>
`;

box.appendChild(div);
});
}

render();

</script>

</body>
</html>
