<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ye Erqi</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue";
background:#fff;
color:#111;
transition:0.4s;
}

/* 顶部 */
.topbar{
position:fixed;
top:18px;
right:18px;
display:flex;
gap:10px;
}

.topbar button{
border:1px solid rgba(0,0,0,0.2);
background:none;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-size:12px;
}

/* 页面区块 */
section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* Apple大标题 */
h1{
font-size:56px;
margin:0;
font-weight:600;
letter-spacing:-1px;
}

p{
max-width:600px;
line-height:1.7;
opacity:0.75;
margin-top:12px;
}

/* 输入 */
input{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
text-align:center;
margin-top:15px;
width:220px;
}

/* 按钮 */
button{
margin-top:12px;
padding:10px 16px;
border:none;
border-radius:20px;
cursor:pointer;
background:#111;
color:#fff;
}

/* 白色主题按钮反转 */
.alt{
background:#fff;
border:1px solid #111;
color:#111;
}

/* Q&A */
textarea{
width:280px;
height:120px;
margin-top:10px;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* 分割线感 */
.small{
font-size:14px;
opacity:0.6;
margin-top:10px;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="topbar">
<button onclick="lang()">EN/中</button>
<button onclick="toggleMusic()">🎵</button>
</div>

<!-- ===== 1 HOME ===== -->
<section id="home">

<h1>Say My Name</h1>

<p id="sub">请输入你的名字进入</p>

<input id="name" placeholder="name">
<button onclick="check()">Enter</button>

<p id="msg" class="small"></p>

<!-- 音乐 -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3"></audio>

<button class="alt" onclick="playMusic()">Play Music</button>

</section>

<!-- ===== 2 ABOUT ===== -->
<section id="about" style="display:none">

<h1 id="title">Ye Erqi</h1>

<p id="intro">
宁波大学 · 电气工程 · 大二 · 19岁
</p>

<p id="desc">
兴趣：乒乓球 / 足球 / 阅读<br>
最爱：《球状闪电》<br>
Life song：Hey Jude<br><br>
<span style="opacity:0.5">strive for your future</span>
</p>

</section>

<!-- ===== 3 Q&A ===== -->
<section id="qa" style="display:none">

<h1>Q&A</h1>

<p class="small">
Send your question to:
<br>
15258895590@163.com
</p>

<textarea id="q" placeholder="ask something..."></textarea>
<br>
<button onclick="send()">Send</button>

<p class="small">（会尽力回复！）</p>

</section>

<script>

let en=false;
let music=document.getElementById("music");

/* ===== 验证 ===== */
function check(){
let v=document.getElementById("name").value;

if(v==="叶尔祺"){
document.getElementById("home").style.display="none";
document.getElementById("about").style.display="flex";
document.getElementById("qa").style.display="flex";
}else{
document.getElementById("msg").innerText="Wrong Name";
}
}

/* ===== 邮件 ===== */
function send(){
let q=document.getElementById("q").value;
if(!q)return;

window.location.href=
"mailto:15258895590@163.com?subject=Q&A&body="+encodeURIComponent(q);
}

/* ===== 音乐 ===== */
function playMusic(){
music.play();
}

/* ===== 切换语言（结构化） ===== */
const langPack={
zh:{
sub:"请输入你的名字进入",
intro:"宁波大学 · 电气工程 · 大二 · 19岁",
desc:`兴趣：乒乓球 / 足球 / 阅读<br>
最爱：《球状闪电》<br>
Life song：Hey Jude<br><br>
<span style="opacity:0.5">strive for your future</span>`
},
en:{
sub:"Enter your name",
intro:"Ningbo University · Electrical Engineering · Sophomore · 19",
desc:`Table Tennis / Football / Reading<br>
Favorite: Ball Lightning<br>
Life song: Hey Jude<br><br>
<span style="opacity:0.5">strive for your future</span>`
}
};

function lang(){
en=!en;
document.getElementById("sub").innerHTML =
en ? langPack.en.sub : langPack.zh.sub;

document.getElementById("intro").innerHTML =
en ? langPack.en.intro : langPack.zh.intro;

document.getElementById("desc").innerHTML =
en ? langPack.en.desc : langPack.zh.desc;
}

/* ===== 音乐控制 ===== */
function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

</script>

</body>
</html>
